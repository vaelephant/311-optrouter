# 模型路由注册表
# 修改此文件后重启 Gateway 即可生效，无需重新编译。
# 可选环境变量：REGISTRY_CONFIG 指定本文件路径（默认 config/models.toml，相对当前工作目录）。
#
# provider 取值：openai | anthropic | google | together | ollama
# 可选 fallback：某模型请求失败时降级到 fallback_model（需同时配置 fallback_provider_url 与 fallback_provider）。

[[models]]
model = "gpt-4o"
provider = "openai"
provider_url = "https://api.openai.com/v1"

[[models]]
model = "gpt-4o-mini"
provider = "openai"
provider_url = "https://api.openai.com/v1"

[[models]]
model = "gpt-4-turbo"
provider = "openai"
provider_url = "https://api.openai.com/v1"

[[models]]
model = "gpt-4"
provider = "openai"
provider_url = "https://api.openai.com/v1"
fallback_model = "gpt-4o-mini"
fallback_provider_url = "https://api.openai.com/v1"
fallback_provider = "openai"

[[models]]
model = "gpt-3.5-turbo"
provider = "openai"
provider_url = "https://api.openai.com/v1"

[[models]]
model = "o1-preview"
