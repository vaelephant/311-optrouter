# ─────────────────────────────────────────────────────────────────────────────
# OptRouter Gateway — 基础配置（所有环境共享）
# 敏感信息（API Key、DATABASE_URL）请放在 .env 文件或系统环境变量，不要写在这里
# ─────────────────────────────────────────────────────────────────────────────

[server]
# 监听端口（可被 PORT 环境变量覆盖）
port = 3001

# ─── Postgres ────────────────────────────────────────────────────────────────
[postgres]
# 连接池最大连接数
max_connections = 20
# 预热最小连接数（0 = 惰性创建，启动更快但首请求略慢）
min_connections = 1
# 获取连接等待上限（秒）
acquire_timeout_secs = 30
# 单条连接最长存活时间（秒），防止云端强踢长连接
max_lifetime_secs = 1800
# 空闲连接保留时间（秒）
idle_timeout_secs = 300
# 连接失败重试次数（每次等待 retry_wait_secs 后重试）
connect_retry_attempts = 3
connect_retry_wait_secs = 3

# ─── Redis ───────────────────────────────────────────────────────────────────
[redis]
# 默认连接地址（可被 REDIS_URL 环境变量覆盖）
url = "redis://127.0.0.1:6379"

# ─── AI Provider ─────────────────────────────────────────────────────────────
[providers]
# 上游请求超时（秒），大模型生成慢，不要设太短
timeout_secs = 120
# 每个 host 保留的最大空闲连接数
pool_max_idle = 20

[providers.openai]
base_url = "https://api.openai.com/v1"

[providers.anthropic]
base_url = "https://api.anthropic.com"

[providers.google]
base_url = "https://generativelanguage.googleapis.com/v1beta"

[providers.together]
base_url = "https://api.together.xyz/v1"

[providers.ollama]
base_url = "http://localhost:11434/v1"

# ─── 缓存 ────────────────────────────────────────────────────────────────────
[cache]
# API Key 元数据在 Redis 中的缓存 TTL（秒）
key_ttl_secs = 1800
