# ─────────────────────────────────────────────────────────────────────────────
# OptRouter Gateway — 开发环境覆盖（APP_ENV=dev，默认）
# 只需写与 base.toml 不同的值
# ─────────────────────────────────────────────────────────────────────────────

[postgres]
# 本地开发连接池用小一点
max_connections = 5
min_connections = 1
# 本地 DB 通常响应快，超时可以短一点
acquire_timeout_secs = 15

[cache]
# 开发时缓存短一点，改了 key 状态能快速生效
key_ttl_secs = 60
